<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            border-collapse: collapse;
        }

        table>tbody>tr {
            position: relative;
            width: 500px;
            height: 100px;
        }

        table>tbody>tr>td {
            width: 500px;
            height: 50px;
            position: absolute;
        }

        table>tbody>tr>td:first-child {
            top: 0px;
            left: 0px;
            border-top: 5px solid rgb(155, 154, 154);
            border-left: 5px solid rgb(155, 154, 154);
            border-right: 5px solid rgb(155, 154, 154);
            background-color: black;

            color: rgb(155, 154, 154);
        }

        table>tbody>tr>td:last-child {
            top: 50px;
            left: 0px;
        }



        .tr_one>td:first-child {
            border-top-right-radius: 25px;
            border-top-left-radius: 25px;
            text-align: center;
            line-height: 50px;

        }

        .tr_one>td:last-child {
            border-top: 5px solid black;
            border-left: 5px solid black;
            border-right: 5px solid black;
            text-align: center;
            line-height: 50px;
            background-color: rgb(155, 154, 154);
            color: black;
        }
    </style>
</head>

<body>
    <table>
        <tr class="tr_one">
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
        <tr>
            <td>제목1</td>
            <td>내용1</td>
        </tr>
    </table>
</body>

</html>
